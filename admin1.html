<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACROBATIC - Admin Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ccc;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0;
            color: #333;
            letter-spacing: 2px;
        }
        .main-container {
            display: flex;
            gap: 20px;
        }
        /* Sidebar Filters */
        .sidebar {
            width: 250px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            align-self: flex-start;
        }
        .sidebar h3 {
            margin-top: 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        .filter-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
            background: #f8f9fa;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            font-weight: bold;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #007bff;

            border-color: #007bff;
        }
        .sidebar-divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 12px 0;
        }
        .btn-payments-list {
            background: #17a2b8;
            color: white;
            border-color: #17a2b8;
        }
        .btn-payments-list:hover {
            background: #138496;
            border-color: #138496;
        }
        /* Content Area */
        .content {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .content-header-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        /* Action Buttons */
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-add { background: #28a745; color: white; }
        .btn-group { background: #6610f2; color: white; }
        .btn-close-month { background: #dc3545; color: white; }
        .btn-save { background: #17a2b8; color: white; }
        .btn-info { background: #ffc107; color: #333; }
        .btn-delete { background: #bd2130; color: white; border-radius: 50%; width: 30px; height: 30px; padding: 0; }

        /* Children List/Table */
        .child-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #eee;
            gap: 10px;
            flex-wrap: wrap;
        }
        .child-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            min-width: 200px;
        }
        .child-img {
            width: 50px;

        }
        .child-name {
            font-weight: bold;

        }
        .controls {
            display: flex;
            align-items: center;

        }
        .assign-group {
            display: flex;
            align-items: center;

        }
        .assign-group select { min-width: 170px; }
        .history-text {
            font-size: 11px;
            color: #666;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Payment status select colors */
        .pay-select {
            font-weight: bold;

            border-radius: 4px;
            padding: 8px 6px;

            cursor: pointer;
        }
        .pay-select.unpaid {

        }
        .pay-select.paid {

        }
        .pay-select option {
            color: #333;

        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 24px;
            cursor: pointer;
        }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .info-table { width: 100%; border-collapse: collapse; }
        .info-table td { padding: 6px 4px; border-bottom: 1px solid #eee; vertical-align: top; }
        .info-table td:first-child { font-weight: bold; color: #555; width: 40%; }
        #groupList li { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #eee; }

        /* Payments list modal */

            margin-bottom: 15px;

            border-bottom: 1px solid #eee;

        .payment-name {
            font-weight: bold;
        }
        .payment-group {
            color: #999;
            font-size: 12px;
            font-weight: normal;
        }
        .payment-date-badge {
            color: #28a745;
            font-weight: bold;
            white-space: nowrap;
        }
        #paymentsCount {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="main-container">

            <div class="form-group"><label>Երեխայի Ազգանուն *</label><input type="text" id="childSurname" required placeholder="Ազգանուն"></div>
            <div class="form-group"><label>Ծննդյան Ամսաթիվ *</label><input type="date" id="childDob" required></div>
            <div class="form-group"><label>Ծնողի Անուն Ազգանուն *</label><input type="text" id="parentName" required placeholder="Անուն Ազգանուն"></div>

            <div class="form-group"><label>Հեռախոսահամար 2</label><input type="tel" id="phone2" placeholder="+374 XXXXXXXX"></div>

<div class="modal hidden" id="infoModal">

<div class="modal hidden" id="groupModal">
    <div class="modal-content" style="max-width: 450px;">
        <span class="close-modal" id="closeGroupModalBtn">&times;</span>
        <h3>Խմբերի Կառավարում</h3>
        <div class="form-group">
            <label>Նոր Խմբի Անվանում</label>

            <select id="paymentsMonthFilter">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    const firebaseConfig = {
        apiKey: "AIzaSyAPguplFnBe6Yy9QNeb3DJwt9qFydFNcA4",
        authDomain: "acrobatic-5c3b5.firebaseapp.com",
        projectId: "acrobatic-5c3b5",
        storageBucket: "acrobatic-5c3b5.firebasestorage.app",
        messagingSenderId: "342555745751",
        appId: "1:342555745751:web:ea3b23ff8855fa52c8ff92",
        measurementId: "G-BSVEYYC0P5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
const auth = getAuth(app); // 2. ԱՎԵԼԱՑՐՈՒ ԱՅՍ ՏՈՂԸ

// 3. ԱՎԵԼԱՑՐՈՒ ԱՅՍ ՍՏՈՒԳՈՒՄԸ, ՈՐԸ ԿՊԱՇՏՊԱՆԻ ԷՋԸ՝
onAuthStateChanged(auth, (user) => {
    if (!user) {
        // Եթե օգտատերը լոգին եղած չէ, նրան հետ է ուղարկում մուտքի էջ (index.html)
        window.location.href = "index.html";
    }
});


    
    const CLOUDINARY_CLOUD_NAME = "dhxhjvoc7"; 
    const CLOUDINARY_UPLOAD_PRESET = "z9r54n9z"; 

    let allStudents = [];
    let groupsCache = []; // { id, label }
    let currentFilter = "all";

    // Էլեմենտներ
    const childrenList = document.getElementById('childrenList');
    const childCountText = document.getElementById('childCount');
    const addModal = document.getElementById('addModal');
    const addGroupSelect = document.getElementById('addGroup');
    const groupFilters = document.getElementById('groupFilters');
    const groupModal = document.getElementById('groupModal');
    const groupList = document.getElementById('groupList');
    const paymentsModal = document.getElementById('paymentsModal');
    const paymentsGroupFilter = document.getElementById('paymentsGroupFilter');
    const paymentsMonthFilter = document.getElementById('paymentsMonthFilter');
    const paymentsList = document.getElementById('paymentsList');
    const paymentsCount = document.getElementById('paymentsCount');

    const MONTH_NAMES_HY = ['Հունվար','Փետրվար','Մարտ','Ապրիլ','Մայիս','Հունիս','Հուլիս','Օգոստոս','Սեպտեմբեր','Հոկտեմբեր','Նոյեմբեր','Դեկտեմբեր'];

    // --- Նկարի սեղմման/փոքրացման ֆունկցիա (Client-side resize) ---
    function resizeImage(file, maxSize = 1000, quality = 0.8) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const reader = new FileReader();

            reader.onload = (e) => {
                img.src = e.target.result;
            };
            reader.onerror = reject;

            img.onload = () => {
                let { width, height } = img;

                if (width > height) {
                    if (width > maxSize) {
                        height = Math.round(height * (maxSize / width));
                        width = maxSize;
                    }
                } else {
                    if (height > maxSize) {
                        width = Math.round(width * (maxSize / height));
                        height = maxSize;
                    }
                }

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                canvas.toBlob((blob) => {
                    if (!blob) {
                        reject(new Error("Նկարը հնարավոր չեղավ սեղմել"));
                        return;
                    }
                    resolve(blob);
                }, 'image/jpeg', quality);
            };

            img.onerror = () => reject(new Error("Նկարը հնարավոր չեղավ բացել"));

            reader.readAsDataURL(file);
        });
    }

    // --- Խմբեր (groups / class-times) ---
    async function loadGroups() {
        const querySnapshot = await getDocs(collection(db, "groups"));
        groupsCache = [];
        querySnapshot.forEach((d) => {
            groupsCache.push({ id: d.id, ...d.data() });
        });
        groupsCache.sort((a, b) => (a.label || '').localeCompare(b.label || '', 'hy'));
        renderSidebarFilters();
        populateAddGroupSelect();
    }

    function renderSidebarFilters() {
        groupFilters.innerHTML = '';
        groupsCache.forEach(g => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn' + (currentFilter === g.id ? ' active' : '');
            btn.setAttribute('data-filter', g.id);
            btn.textContent = g.label;
            groupFilters.appendChild(btn);
        });
    }

    function populateAddGroupSelect() {
        addGroupSelect.innerHTML = '<option value="">-- Չնշանակված --</option>';
        groupsCache.forEach(g => {
            const o = document.createElement('option');
            o.value = g.id;
            o.textContent = g.label;
            addGroupSelect.appendChild(o);
        });
    }

    function renderGroupList() {
        groupList.innerHTML = '';
        if (groupsCache.length === 0) {
            groupList.innerHTML = "<li style='color:#777; border:none;'>Խմբեր դեռ չկան</li>";
            return;
        }
        groupsCache.forEach(g => {
            const li = document.createElement('li');
            const span = document.createElement('span');
            span.textContent = g.label;
            const delBtn = document.createElement('button');
            delBtn.className = 'btn btn-delete';
            delBtn.textContent = 'X';
            delBtn.addEventListener('click', async () => {
                if (confirm(`Ջնջե՞լ "${g.label}" խումբը:`)) {
                    await deleteDoc(doc(db, "groups", g.id));
                    await loadGroups();
                    renderGroupList();
                    renderList();
                }
            });
            li.appendChild(span);
            li.appendChild(delBtn);
            groupList.appendChild(li);
        });
    }

    document.getElementById('openGroupModalBtn').addEventListener('click', () => {
        renderGroupList();
        groupModal.classList.remove('hidden');
    });
    document.getElementById('closeGroupModalBtn').addEventListener('click', () => groupModal.classList.add('hidden'));

    document.getElementById('addGroupBtn').addEventListener('click', async () => {
        const input = document.getElementById('newGroupLabel');
        const label = input.value.trim();
        if (!label) {
            alert('Գրեք խմբի անվանումը');
            return;
        }
        await addDoc(collection(db, "groups"), { label, createdAt: new Date() });
        input.value = '';
        await loadGroups();
        renderGroupList();
    });

    // Բեռնել տվյալները Firestore-ից
    async function loadData() {
        childrenList.innerHTML = "Բեռնվում է...";
        allStudents = [];
        const querySnapshot = await getDocs(collection(db, "registrations"));
        querySnapshot.forEach((doc) => {
            allStudents.push({ id: doc.id, ...doc.data() });
        });
        renderList();
    }

    // Ցուցակի արտածում ըստ ֆիլտրի
    function renderList() {
        childrenList.innerHTML = "";
        let filtered = allStudents.filter(student => {
            if (currentFilter === "all") return true;
            if (currentFilter === "unassigned") return !student.groupId;
            return student.groupId === currentFilter;
        });

        childCountText.textContent = filtered.length;

        filtered.forEach(student => {
            const isPaid = student.isPaid || false;
            const attendanceHistory = student.attendance || [];
            const paymentHistory = student.payments || [];
            const groupLabel = student.groupLabel || '';

            const row = document.createElement('div');
            row.className = 'child-row';
            row.innerHTML = `
                <div class="child-info">
                    <img src="${student.photoUrl || 'https://via.placeholder.com/50'}" class="child-img" loading="lazy">
                    <div>
                        <div class="child-name">${student.childName} ${student.childSurname}</div>
                        <div id="meta-${student.id}" style="font-size:12px; color:#777;">
                            ${groupLabel || 'Խումբը դեռ նշանակված չէ'}
                        </div>
                    </div>
                </div>
                <div class="controls">
                    <div class="assign-group">
                        <select id="assign-${student.id}">
                            <option value="">-- Խումբ --</option>
                            ${groupsCache.map(g => `<option value="${g.id}" ${student.groupId === g.id ? 'selected' : ''}>${g.label}</option>`).join('')}
                        </select>
                    </div>

                    <select id="pay-${student.id}" class="pay-select ${isPaid ? 'paid' : 'unpaid'}">
                        <option value="false" ${!isPaid ? 'selected' : ''}>Չվճարված</option>
                        <option value="true" ${isPaid ? 'selected' : ''}>Վճարված</option>
                    </select>
                    
                    <select id="att-${student.id}">
                        <option value="">-- Հաճախում --</option>
                        <option value="ներկա">Ներկա</option>
                        <option value="բացակա">Բացակա</option>
                    </select>

                    <button class="btn btn-info" id="info-${student.id}">Տվյալներ</button>
                    <button class="btn" style="background: #6c757d; color: white;" id="hist-${student.id}">Պատմություն</button>
                    
                    <div class="history-text">
                        Վճարներ: ${paymentHistory.join(', ') || 'Չկա'}<br>
                        Օրեր: ${attendanceHistory.join(', ') || 'Չկա'}
                    </div>

                    <button class="btn btn-save" id="save-${student.id}">Պահպանել</button>
                    <button class="btn btn-delete" id="del-${student.id}">X</button>
                </div>
            `;
            childrenList.appendChild(row);

            // Վճարման select-ի գույնը փոխվում է անմիջապես ընտրության պահին
            const paySelectEl = document.getElementById(`pay-${student.id}`);
            paySelectEl.addEventListener('change', () => {
                const nowPaid = paySelectEl.value === "true";
                paySelectEl.classList.toggle('paid', nowPaid);
                paySelectEl.classList.toggle('unpaid', !nowPaid);
            });

            // Ինֆո Կոճակ` ցույց է տալիս ծնողի գրանցած ԲՈԼՈՐ տվյալները (առանց նկարի, նկարը մնում է իր տեղում)
            document.getElementById(`info-${student.id}`).addEventListener('click', () => {
                const infoModal = document.getElementById('infoModal');
                document.getElementById('infoModalTitle').textContent = `${student.childName} ${student.childSurname} - Տվյալներ`;
                const table = document.getElementById('infoModalTable');
                const createdAtText = student.createdAt ? new Date(student.createdAt.seconds * 1000).toLocaleDateString() : '—';
                const rows = [
                    ['Երեխայի անուն', student.childName || '—'],
                    ['Երեխայի ազգանուն', student.childSurname || '—'],
                    ['Ծննդյան օր', student.childDob || '—'],
                    ['Ծնողի անուն ազգանուն', student.parentName || '—'],
                    ['Հեռախոս 1', student.phone || '—'],
                    ['Հեռախոս 2', student.phone2 || '—'],
                    ['Հասցե', student.address || '—'],
                    ['Խումբ', student.groupLabel || 'Դեռ նշանակված չէ'],
                    ['Գրանցվել է', createdAtText]
                ];
                table.innerHTML = rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
                infoModal.classList.remove('hidden');
            });

            // Պատմություն Կոճակ
            document.getElementById(`hist-${student.id}`).addEventListener('click', () => {
                const hModal = document.getElementById('historyModal');
                document.getElementById('historyModalTitle').textContent = `${student.childName} ${student.childSurname} - Պատմություն`;

                const attUl = document.getElementById('modalAttendanceList');
                const payUl = document.getElementById('modalPaymentList');

                attUl.innerHTML = "";
                payUl.innerHTML = "";

                if(attendanceHistory.length === 0) {
                    attUl.innerHTML = "<li style='color:#777;'>Չկա</li>";
                } else {
                    attendanceHistory.forEach(day => {
                        let li = document.createElement('li');
                        li.textContent = day;
                        li.style.color = day.includes("ներկա") ? "#28a745" : "#dc3545";
                        li.style.fontWeight = "bold";
                        attUl.appendChild(li);
                    });
                }

                if(paymentHistory.length === 0) {
                    payUl.innerHTML = "<li style='color:#777;'>Չկա</li>";
                } else {
                    paymentHistory.forEach(pay => {
                        let li = document.createElement('li');
                        li.textContent = `✅ ${pay}`;
                        li.style.color = "#28a745";
                        li.style.fontWeight = "bold";
                        payUl.appendChild(li);
                    });
                }

                hModal.classList.remove('hidden');
            });

            // Պահպանել տվյալ երեխայի կարգավիճակը (խումբ + վճար + հաճախում)
            document.getElementById(`save-${student.id}`).addEventListener('click', async (e) => {
                const btnSave = e.target;
                btnSave.disabled = true;
                const oldText = btnSave.textContent;
                btnSave.textContent = "...";

                const payStatus = document.getElementById(`pay-${student.id}`).value === "true";
                const attStatus = document.getElementById(`att-${student.id}`).value;
                const today = new Date().toLocaleDateString('hy-AM');

                const assignSelect = document.getElementById(`assign-${student.id}`);
                const newGroupId = assignSelect.value || null;
                const newGroupObj = groupsCache.find(g => g.id === newGroupId);
                const newGroupLabel = newGroupObj ? newGroupObj.label : '';

                let updatedAttendance = [...attendanceHistory];
                let updatedPayments = [...paymentHistory];

                if (attStatus) {
                    updatedAttendance.push(`${today} (${attStatus})`);
                }
                if (payStatus && !isPaid) {
                    updatedPayments.push(today);
                }

                try {
                    const docRef = doc(db, "registrations", student.id);
                    await updateDoc(docRef, {
                        isPaid: payStatus,
                        attendance: updatedAttendance,
                        payments: updatedPayments,
                        groupId: newGroupId,
                        groupLabel: newGroupLabel
                    });

                    // ԼՈԿԱԼ ԹԱՐՄԱՑՈՒՄ
                    student.isPaid = payStatus;
                    student.attendance = updatedAttendance;
                    student.payments = updatedPayments;
                    student.groupId = newGroupId;
                    student.groupLabel = newGroupLabel;

                    // Թարմացնում ենք .history-text դիվի պարունակությունը
                    const row = btnSave.closest('.child-row');
                    if (row) {
                        const historyDiv = row.querySelector('.history-text');
                        if (historyDiv) {
                            historyDiv.innerHTML = `
                                Վճարներ: ${updatedPayments.join(', ') || 'Չկա'}<br>
                                Օրեր: ${updatedAttendance.join(', ') || 'Չկա'}
                            `;
                        }
                        const metaDiv = document.getElementById(`meta-${student.id}`);
                        if (metaDiv) {
                            metaDiv.textContent = newGroupLabel || 'Խումբը դեռ նշանակված չէ';
                        }
                    }

                    // Ապահովում ենք որ վճարման select-ի գույնը ճիշտ է պահպանումից հետո
                    paySelectEl.classList.toggle('paid', payStatus);
                    paySelectEl.classList.toggle('unpaid', !payStatus);

                    // Մաքրում ենք հաճախման select-ը
                    document.getElementById(`att-${student.id}`).value = "";
                    alert("Պահպանվեց:");
                } catch (err) {
                    alert("Սխալ պահպանելիս: " + err.message);
                } finally {
                    btnSave.disabled = false;
                    btnSave.textContent = oldText;
                }
            });

            // Ջնջել Բազայից
            document.getElementById(`del-${student.id}`).addEventListener('click', async () => {
                if (confirm(`Վստա՞հ եք, որ ուզում եք ջնջել ${student.childName}-ին բազայից:`)) {
                    await deleteDoc(doc(db, "registrations", student.id));
                    loadData();
                }
            });
        });
    }

    // Ֆիլտրերի սեղմման իրադարձություն (delegation, քանի որ խմբային ֆիլտրերը դինամիկ են)
    document.querySelector('.sidebar').addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn || btn.id === 'openPaymentsModalBtn') return;
        document.querySelectorAll('.filter-btn').forEach(b => {
            if (b.id !== 'openPaymentsModalBtn') b.classList.remove('active');
        });
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        renderList();
    });

    // Փակել Ամիսը (Բոլորին սարքում է Չվճարված)
    document.getElementById('closeMonthBtn').addEventListener('click', async () => {
        if (confirm("Վստա՞հ եք, որ ուզում եք փակել ամիսը: Բոլոր հաճախորդների կարգավիճակը կդառնա ՉՎՃԱՐՎԱԾ:")) {
            for (let student of allStudents) {
                if (student.isPaid) {
                    await updateDoc(doc(db, "registrations", student.id), { isPaid: false });
                }
            }
            alert("Ամիսը փակված է:");
            loadData();
        }
    });

    // Մոդալի բացել/փակելը
    document.getElementById('openAddModalBtn').addEventListener('click', () => {
        populateAddGroupSelect();
        addModal.classList.remove('hidden');
    });
    document.getElementById('closeAddModalBtn').addEventListener('click', () => addModal.classList.add('hidden'));
    document.getElementById('closeHistoryModalBtn').addEventListener('click', () => document.getElementById('historyModal').classList.add('hidden'));
    document.getElementById('closeInfoModalBtn').addEventListener('click', () => document.getElementById('infoModal').classList.add('hidden'));

    // --- Վճարածների Ցուցակ (ըստ ամսվա և խմբի) ---

    // Ամսաթվի string-ից (dd.mm.yyyy, ինչպես toLocaleDateString('hy-AM') է տալիս) ստանում ենք "yyyy-mm" բանալի
    function getMonthKeyFromDateStr(dateStr) {
        if (!dateStr) return null;
        const parts = dateStr.trim().split('.');
        if (parts.length !== 3) return null;
        const [d, m, y] = parts;
        if (!y || !m) return null;
        return `${y}-${m.padStart(2, '0')}`;
    }

    function monthKeyToLabel(key) {
        const [year, month] = key.split('-');
        const idx = parseInt(month, 10) - 1;
        const name = MONTH_NAMES_HY[idx] || month;
        return `${name} ${year}`;
    }

    // Հավաքում ենք բոլոր վճարումները՝ յուրաքանչյուր վճարման օրվա համար մեկ առանձին տող
    function getAllPaymentEntries() {
        const entries = [];
        allStudents.forEach(student => {
            const payments = student.payments || [];
            payments.forEach(dateStr => {
                entries.push({
                    name: `${student.childName || ''} ${student.childSurname || ''}`.trim(),
                    date: dateStr,
                    monthKey: getMonthKeyFromDateStr(dateStr),
                    groupId: student.groupId || '',
                    groupLabel: student.groupLabel || 'Առանց խմբի'
                });
            });
        });
        return entries;
    }

    function populatePaymentsFilters() {
        // Խմբերի ֆիլտր
        paymentsGroupFilter.innerHTML = '<option value="all">Բոլոր Խմբերը</option>';
        groupsCache.forEach(g => {
            const o = document.createElement('option');
            o.value = g.id;
            o.textContent = g.label;
            paymentsGroupFilter.appendChild(o);
        });

        // Ամիսների ֆիլտր (միայն այն ամիսները, որտեղ իրական վճարումներ կան)
        const allEntries = getAllPaymentEntries();
        const monthKeys = [...new Set(allEntries.map(e => e.monthKey).filter(Boolean))];
        monthKeys.sort().reverse();

        paymentsMonthFilter.innerHTML = '<option value="all">Բոլոր Ամիսները</option>';
        monthKeys.forEach(key => {
            const o = document.createElement('option');
            o.value = key;
            o.textContent = monthKeyToLabel(key);
            paymentsMonthFilter.appendChild(o);
        });
    }

    function renderPaymentsList() {
        const groupVal = paymentsGroupFilter.value;
        const monthVal = paymentsMonthFilter.value;

        let entries = getAllPaymentEntries();

        if (groupVal !== 'all') {
            entries = entries.filter(e => e.groupId === groupVal);
        }
        if (monthVal !== 'all') {
            entries = entries.filter(e => e.monthKey === monthVal);
        }

        // Դասավորում ենք ամսաթվով՝ ամենավերջինը վերևում
        entries.sort((a, b) => {
            const da = (a.date || '').split('.').reverse().join('-');
            const db_ = (b.date || '').split('.').reverse().join('-');
            return db_.localeCompare(da);
        });

        paymentsCount.textContent = `Ընդամենը՝ ${entries.length} վճարում`;
        paymentsList.innerHTML = '';

        if (entries.length === 0) {
            paymentsList.innerHTML = "<li style='color:#777; justify-content:center;'>Վճարումներ չեն գտնվել</li>";
            return;
        }

        entries.forEach(e => {
            const li = document.createElement('li');
            li.innerHTML = `
                <span class="payment-name">${e.name} <span class="payment-group">(${e.groupLabel})</span></span>
                <span class="payment-date-badge">✅ ${e.date}</span>
            `;
            paymentsList.appendChild(li);
        });
    }

    document.getElementById('openPaymentsModalBtn').addEventListener('click', () => {
        populatePaymentsFilters();
        renderPaymentsList();
        paymentsModal.classList.remove('hidden');
    });
    document.getElementById('closePaymentsModalBtn').addEventListener('click', () => paymentsModal.classList.add('hidden'));
    paymentsGroupFilter.addEventListener('change', renderPaymentsList);
    paymentsMonthFilter.addEventListener('change', renderPaymentsList);

    // Նոր երեխայի գրանցում մոդալից (Cloudinary + Firestore)
    document.getElementById('registrationForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = "Բեռնվում է...";

        const file = document.getElementById('photoFile').files[0];
        try {
            let photoUrl = "";
            if (file) {
                submitBtn.textContent = "Նկարը մշակվում է...";
                const resizedBlob = await resizeImage(file, 1000, 0.8);

                submitBtn.textContent = "Բեռնվում է...";
                const cloudinaryData = new FormData();
                cloudinaryData.append("file", resizedBlob, "photo.jpg");
                cloudinaryData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: "POST", body: cloudinaryData });
                const data = await res.json();
                photoUrl = data.secure_url.replace("/upload/", "/upload/f_webp,q_auto/");
            }

            const selectedGroupId = addGroupSelect.value || null;
            const selectedGroupObj = groupsCache.find(g => g.id === selectedGroupId);
            const selectedGroupLabel = selectedGroupObj ? selectedGroupObj.label : '';

            const formData = {
                childName: document.getElementById('childName').value,
                childSurname: document.getElementById('childSurname').value,
                childDob: document.getElementById('childDob').value,
                parentName: document.getElementById('parentName').value,
                phone: document.getElementById('phone').value,
                phone2: document.getElementById('phone2').value,
                address: document.getElementById('address').value,
                groupId: selectedGroupId,
                groupLabel: selectedGroupLabel,
                photoUrl: photoUrl,
                isPaid: false,
                attendance: [],
                payments: [],
                createdAt: new Date()
            };

            await addDoc(collection(db, "registrations"), formData);
            alert("Երեխան հաջողությամբ ավելացվեց բազա:");
            addModal.classList.add('hidden');
            document.getElementById('registrationForm').reset();
            loadData();
        } catch (err) {
            alert("Սխալ: " + err.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Պահպանել Բազայում";
        }
    });

    // Առաջին բեռնումը
    async function init() {
        await loadGroups();
        await loadData();
    }
    init();
</script>
</body>
</html>
